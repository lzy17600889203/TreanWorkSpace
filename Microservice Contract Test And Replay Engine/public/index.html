<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微服务契约测试与回放引擎</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">
                <span class="glow">🔧</span> 微服务契约测试与回放引擎
            </h1>
            <div class="status-bar">
                <span id="status-dot" class="status-dot"></span>
                <span id="status-text">就绪</span>
            </div>
        </header>

        <div class="canvas-container">
            <canvas id="animation-canvas"></canvas>
            <div class="overlay">
                <div class="source-label">📤 请求源</div>
                <div class="target-label">📥 响应池</div>
            </div>
        </div>

        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-label">请求总数</div>
                <div class="stat-value" id="total-requests">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">成功请求</div>
                <div class="stat-value success" id="success-requests">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">超时请求</div>
                <div class="stat-value warning" id="timeout-requests">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">错误请求</div>
                <div class="stat-value error" id="error-requests">0</div>
            </div>
        </div>

        <div class="scenes-container">
            <div class="section-title">🎬 场景预设</div>
            <div class="scenes-grid" id="scenes-grid"></div>
        </div>

        <div class="controls-container">
            <button class="btn btn-primary" id="btn-start">
                <span class="btn-icon">▶</span>
                开始压测
            </button>
            <button class="btn btn-secondary" id="btn-replay">
                <span class="btn-icon">🔄</span>
                一键回放
            </button>
            <button class="btn btn-danger" id="btn-stop">
                <span class="btn-icon">⏹</span>
                停止
            </button>
            <button class="btn btn-neutral" id="btn-clear">
                <span class="btn-icon">🗑</span>
                清空
            </button>
        </div>
    </div>

    <script src="js/animation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
