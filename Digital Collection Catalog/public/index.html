<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的数字收藏目录</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .add-form {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    .add-form h2 {
      color: #333;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .add-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .add-btn:hover {
      transform: translateY(-2px);
    }

    .items-list {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    .items-list h2 {
      color: #333;
      margin-bottom: 20px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .item-author {
      color: #666;
      font-size: 14px;
    }

    .item-date {
      color: #999;
      font-size: 12px;
      margin-top: 4px;
    }

    .item-price {
      font-size: 20px;
      font-weight: 700;
      color: #667eea;
      margin-right: 20px;
    }

    .delete-btn {
      padding: 8px 16px;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .delete-btn:hover {
      background: #ff3838;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px;
    }

    .total-section {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .total-label {
      font-size: 18px;
      color: #666;
      margin-bottom: 10px;
    }

    .total-amount {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 我的数字收藏目录</h1>

    <div class="add-form">
      <h2>添加新收藏</h2>
      <form id="addForm">
        <div class="form-group">
          <label>名称</label>
          <input type="text" id="name" required placeholder="例如：《三体》全集">
        </div>
        <div class="form-group">
          <label>作者/出品方</label>
          <input type="text" id="author" placeholder="例如：刘慈欣">
        </div>
        <div class="form-group">
          <label>价格（元）</label>
          <input type="number" id="price" required step="0.01" placeholder="例如：99.99">
        </div>
        <button type="submit" class="add-btn">添加到收藏</button>
      </form>
    </div>

    <div class="items-list">
      <h2>我的收藏</h2>
      <div id="itemsContainer"></div>
    </div>

    <div class="total-section">
      <div class="total-label">在这个爱好上总共投入</div>
      <div class="total-amount" id="totalAmount">¥0.00</div>
    </div>
  </div>

  <script>
    async function fetchItems() {
      const res = await fetch('/api/items');
      const items = await res.json();
      renderItems(items);
    }

    async function fetchTotal() {
      const res = await fetch('/api/total');
      const { total } = await res.json();
      document.getElementById('totalAmount').textContent = `¥${total.toFixed(2)}`;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function renderItems(items) {
      const container = document.getElementById('itemsContainer');
      if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">还没有收藏，快来添加第一个吧！</div>';
        return;
      }
      container.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-info">
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="item-author">${escapeHtml(item.author || '未知')}</div>
            <div class="item-date">收藏时间：${formatDate(item.created_at)}</div>
          </div>
          <div class="item-price">¥${item.price.toFixed(2)}</div>
          <button class="delete-btn" onclick="deleteItem(${item.id})">删除</button>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function addItem(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const author = document.getElementById('author').value;
      const price = parseFloat(document.getElementById('price').value);

      const res = await fetch('/api/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, author, price })
      });

      if (res.ok) {
        e.target.reset();
        fetchItems();
        fetchTotal();
      } else {
        const data = await res.json();
        alert(data.error || '添加失败');
      }
    }

    async function deleteItem(id) {
      if (confirm('确定要删除这个收藏吗？')) {
        await fetch(`/api/items/${id}`, { method: 'DELETE' });
        fetchItems();
        fetchTotal();
      }
    }

    document.getElementById('addForm').addEventListener('submit', addItem);
    fetchItems();
    fetchTotal();
  </script>
</body>
</html>
