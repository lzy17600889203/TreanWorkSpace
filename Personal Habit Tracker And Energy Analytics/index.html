<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人习惯追踪 & 精力分析</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>个人习惯追踪 & 精力分析</h1>
            <div class="preset-buttons">
                <button onclick="loadPreset('empty')">初始化空白</button>
                <button onclick="loadPreset('perfect')">完美作息</button>
                <button onclick="loadPreset('overworked')">连续熬夜</button>
                <button onclick="loadPreset('weekend')">周末放松</button>
            </div>
        </header>

        <div class="health-score">
            <h2>今日综合健康分</h2>
            <div class="score-display" id="scoreDisplay">--</div>
        </div>

        <div class="charts">
            <div class="chart-container">
                <h3>日历热力图</h3>
                <canvas id="heatmapCanvas"></canvas>
            </div>
            <div class="chart-container">
                <h3>精力趋势</h3>
                <canvas id="energyCanvas"></canvas>
            </div>
        </div>

        <div class="slider-container">
            <label for="monthSlider">月份</label>
            <input type="range" id="monthSlider" min="0" max="0" value="0">
            <span id="monthLabel">--</span>
        </div>

        <div class="input-form">
            <h3>记录今日数据</h3>
            <div class="form-group">
                <label>睡眠 (小时):</label>
                <input type="number" id="sleepInput" min="0" max="24" step="0.5" value="7">
            </div>
            <div class="form-group">
                <label>运动 (分钟):</label>
                <input type="number" id="exerciseInput" min="0" max="300" step="5" value="30">
            </div>
            <div class="form-group">
                <label>专注 (小时):</label>
                <input type="number" id="focusInput" min="0" max="24" step="0.5" value="6">
            </div>
            <div class="form-group">
                <label>精力 (0-100):</label>
                <input type="number" id="energyInput" min="0" max="100" step="1" value="70">
            </div>
            <button onclick="saveToday()">保存</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
