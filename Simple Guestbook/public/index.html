<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匿名留言互动墙</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>匿名留言互动墙</h1>
      <p class="subtitle">分享你的心声，与大家交流</p>
    </header>

    <div class="scenario-buttons">
      <button class="scenario-btn" data-scenario="normal">正常友好交流区</button>
      <button class="scenario-btn" data-scenario="sensitive">包含敏感词的攻击性留言</button>
      <button class="scenario-btn" data-scenario="spam">瞬间高频刷屏灌水</button>
      <button class="scenario-btn" data-scenario="welcome">仅有单条欢迎语</button>
      <button class="scenario-btn danger" id="clearBtn">清空留言</button>
    </div>

    <form id="messageForm" class="message-form">
      <div class="form-group">
        <input type="text" id="nickname" placeholder="输入你的昵称" maxlength="20" required>
      </div>
      <div class="form-group">
        <textarea id="content" placeholder="输入留言内容" maxlength="500" required></textarea>
      </div>
      <button type="submit" class="submit-btn">发布留言</button>
    </form>

    <div id="errorMessage" class="error-message"></div>

    <div class="stats-bar">
      <span id="totalCount">共 0 条留言</span>
    </div>

    <div id="messageList" class="message-list"></div>

    <div id="pagination" class="pagination"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
