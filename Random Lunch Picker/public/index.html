<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机午餐选择器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🍱 今天吃什么？</h1>
    <p class="subtitle">选择困难症的终极解决方案</p>
    
    <div class="slot-machine">
      <div class="slot-container">
        <div class="slot" id="slot">
          <div class="item">点击下方按钮开始抽取</div>
        </div>
      </div>
    </div>
    
    <div class="result" id="result" style="display: none;">
      <div class="result-name" id="resultName"></div>
      <div class="result-info">
        <span id="resultCuisine"></span>
        <span class="separator">|</span>
        <span id="resultRating"></span>
        <span class="separator">|</span>
        <span id="resultPrice"></span>
      </div>
    </div>
    
    <div class="button-container">
      <button id="startBtn" class="btn start-btn">🎲 开始抽取</button>
      <button id="restartBtn" class="btn restart-btn" style="display: none;">🔄 重新抽取</button>
      <button id="addRestaurantBtn" class="btn add-btn">➕ 添加餐厅</button>
    </div>
    
    <div class="add-form" id="addForm" style="display: none;">
      <h3>添加新餐厅</h3>
      <form id="restaurantForm">
        <div class="form-group">
          <label for="restaurantName">餐厅名称 *</label>
          <input type="text" id="restaurantName" required placeholder="例如：老北京炸酱面">
        </div>
        <div class="form-group">
          <label for="restaurantCuisine">菜系</label>
          <input type="text" id="restaurantCuisine" placeholder="例如：京菜">
        </div>
        <div class="form-group">
          <label for="restaurantRating">评分 (1-5)</label>
          <input type="number" id="restaurantRating" min="1" max="5" step="0.1" value="4.0">
        </div>
        <div class="form-group">
          <label for="restaurantPrice">价格区间</label>
          <select id="restaurantPrice">
            <option value="¥">¥ 便宜</option>
            <option value="¥¥" selected>¥¥ 适中</option>
            <option value="¥¥¥">¥¥¥ 较贵</option>
          </select>
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn submit-btn">✅ 添加</button>
          <button type="button" id="cancelBtn" class="btn cancel-btn">❌ 取消</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
