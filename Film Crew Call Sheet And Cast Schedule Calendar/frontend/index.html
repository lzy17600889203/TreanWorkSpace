<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>制片主任排兵布阵图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h1>🎬 排兵布阵图</h1>
      
      <div class="section">
        <h3>演示控制</h3>
        <div class="button-group" style="flex-direction: column; gap: 10px;">
          <button id="addConflictBtn">模拟档期冲突</button>
          <button id="resetBtn" class="secondary">重置数据</button>
        </div>
      </div>
      
      <div class="section">
        <h3>图例</h3>
        <div class="legend-item">
          <div class="legend-color conflict-indicator"></div>
          <span>档期/场地冲突</span>
        </div>
        <div class="legend-item">
          <div class="legend-color transition-indicator"></div>
          <span>转场缓冲</span>
        </div>
      </div>
      
      <div class="section">
        <h3>操作说明</h3>
        <ul style="font-size: 12px; color: #94a3b8; line-height: 1.8; padding-left: 16px;">
          <li>左右拖拽场次块调整时间</li>
          <li>场次固定在所属演员/场地行，不会错位</li>
          <li>悬停查看详细信息</li>
          <li>双击编辑场次</li>
          <li>顶部切换视图模式</li>
        </ul>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="toolbar">
        <div class="view-mode-buttons">
          <button class="active" data-mode="actors">演员视图</button>
          <button data-mode="locations">场地视图</button>
          <button data-mode="equipment">设备视图</button>
        </div>
        <div class="status-bar">
          <div id="conflictCount" class="conflictCount hidden">
            <span class="icon">⚡</span>
            <span>0</span> 个冲突
          </div>
        </div>
      </div>
      
      <div class="canvas-container">
        <canvas id="ganttCanvas"></canvas>
        <div id="tooltip" class="tooltip hidden"></div>
      </div>
    </main>
  </div>
  
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>编辑场次</h2>
      <div class="form-group">
        <label>场次名称</label>
        <input type="text" id="sceneName" placeholder="输入场次名称">
      </div>
      <div class="form-group">
        <label>开始日期</label>
        <input type="date" id="sceneStartDate">
      </div>
      <div class="form-group">
        <label>结束日期</label>
        <input type="date" id="sceneEndDate">
      </div>
      <div class="form-group">
        <label>颜色</label>
        <div class="color-options">
          <div class="color-option" style="background-color: #3b82f6;"></div>
          <div class="color-option" style="background-color: #10b981;"></div>
          <div class="color-option" style="background-color: #f59e0b;"></div>
          <div class="color-option" style="background-color: #ef4444;"></div>
          <div class="color-option" style="background-color: #8b5cf6;"></div>
          <div class="color-option" style="background-color: #ec4899;"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="closeModalBtn" class="secondary">取消</button>
        <button>保存</button>
      </div>
    </div>
  </div>
  
  <script src="js/gantt.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
