<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会议室预订系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .scenario-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .scenario-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.2);
      color: white;
      backdrop-filter: blur(10px);
    }

    .scenario-btn:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    .scenario-btn:active {
      transform: translateY(0);
    }

    .booking-form {
      background: white;
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-group input, .form-group select {
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      background: #f8f9fa;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .submit-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .calendar-section {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .nav-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .nav-btn:hover {
      background: #667eea;
      color: white;
      transform: scale(1.1);
    }

    .current-month {
      font-size: 24px;
      font-weight: 700;
      color: #333;
    }

    .calendar-wrapper {
      overflow: hidden;
      position: relative;
    }

    .calendar-slides {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .calendar-grid {
      flex: 0 0 100%;
      min-width: 0;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .weekday {
      text-align: center;
      font-weight: 600;
      color: #666;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day-cell {
      min-height: 50px;
      max-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      background: #f8f9fa;
      border: 2px solid transparent;
      font-size: 14px;
    }

    .day-cell:hover {
      background: #e8f4fd;
      transform: scale(1.05);
    }

    .day-cell.selected {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
      animation: pulse 1s infinite;
    }

    .day-cell.today {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    .day-cell.other-month {
      opacity: 0.3;
    }

    .day-cell.has-booking {
      background: rgba(255, 193, 7, 0.2);
    }

    .day-cell.has-booking.selected {
      background: linear-gradient(135deg, #ffc107 0%, #ff8f00 100%);
    }

    .booking-dots {
      display: flex;
      gap: 2px;
      margin-top: 4px;
    }

    .booking-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #667eea;
      font-size: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .booking-dot.more {
      background: #ff9800;
      color: white;
      padding: 0 2px;
      width: auto;
    }

    .rooms-section {
      margin-top: 30px;
    }

    .rooms-section h3 {
      margin-bottom: 20px;
      color: #333;
      font-size: 18px;
    }

    .rooms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .room-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .room-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .room-name {
      font-weight: 700;
      font-size: 18px;
      color: #333;
    }

    .room-capacity {
      font-size: 14px;
      color: #666;
      background: white;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .room-location {
      font-size: 13px;
      color: #999;
      margin-bottom: 15px;
    }

    .time-slots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .time-slot {
      padding: 8px 10px;
      text-align: center;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .time-slot.available {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .time-slot.available:hover {
      background: #c8e6c9;
      transform: scale(1.05);
    }

    .time-slot.booked {
      background: #ffcdd2;
      color: #c62828;
      animation: fillAnimation 0.5s ease-out;
    }

    .time-slot.selected {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .time-slot.conflict {
      background: #ffeb3b;
      color: #f57f17;
      animation: conflictPulse 1s infinite;
    }

    .tooltip {
      position: absolute;
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(10px);
      white-space: nowrap;
    }

    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip-arrow {
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 5px solid rgba(0,0,0,0.9);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 450px;
      width: 90%;
      transform: scale(0.8) translateY(50px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .modal-overlay.visible .modal-content {
      transform: scale(1) translateY(0);
    }

    .ticket {
      background: linear-gradient(135deg, #fff8e1 0%, #fff3e0 100%);
      border: 2px dashed #ffc107;
      border-radius: 15px;
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .ticket::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #ffc107, transparent);
    }

    .ticket h3 {
      text-align: center;
      color: #f57c00;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .ticket-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .ticket-info label {
      font-weight: 600;
      color: #666;
    }

    .ticket-info span {
      color: #333;
    }

    .close-btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close-btn:hover {
      background: #5a6fd6;
    }

    .error-message {
      background: #ffebee;
      color: #c62828;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      border-left: 4px solid #c62828;
      animation: shake 0.5s ease;
    }

    .success-message {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      border-left: 4px solid #2e7d32;
    }

    .warning-message {
      background: #fff3e0;
      color: #f57c00;
      padding: 15px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      border-left: 4px solid #f57c00;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(102, 126, 234, 0); }
    }

    @keyframes fillAnimation {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes conflictPulse {
      0%, 100% { background: #ffeb3b; }
      50% { background: #fff176; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 0.5s ease;
    }

    .slot-clearing {
      animation: clearSlot 0.4s ease-out forwards;
    }

    @keyframes clearSlot {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.9); }
      100% { opacity: 0; transform: scale(0.8); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>会议室预订系统</h1>

    <div class="scenario-buttons">
      <button class="scenario-btn" data-scenario="available">空闲充足的周一至周三</button>
      <button class="scenario-btn" data-scenario="full">全部爆满的周五下午</button>
      <button class="scenario-btn" data-scenario="conflict">时间重叠的冲突预订</button>
      <button class="scenario-btn" data-scenario="overnight">跨越午夜的超长会议</button>
    </div>

    <div class="booking-form">
      <div class="form-row">
        <div class="form-group">
          <label>申请人</label>
          <input type="text" id="applicant" placeholder="请输入姓名" value="测试用户">
        </div>
        <div class="form-group">
          <label>会议室</label>
          <select id="room-select">
            <option value="">请选择会议室</option>
          </select>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="booking-date">
        </div>
        <div class="form-group">
          <label>开始时间</label>
          <select id="start-time">
            <option value="">选择开始时间</option>
          </select>
        </div>
        <div class="form-group">
          <label>结束时间</label>
          <select id="end-time">
            <option value="">选择结束时间</option>
          </select>
        </div>
      </div>
      <button class="submit-btn" onclick="submitBooking()">提交预订</button>
    </div>

    <div class="calendar-section">
      <div class="calendar-header">
        <button class="nav-btn" onclick="prevMonth()">&#8249;</button>
        <div class="current-month" id="current-month"></div>
        <button class="nav-btn" onclick="nextMonth()">&#8250;</button>
      </div>
      <div class="calendar-wrapper">
        <div class="calendar-slides" id="calendar-slides">
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
      </div>
      <div class="rooms-section" id="rooms-section">
        <h3>今日会议室时段</h3>
        <div class="rooms-grid" id="rooms-grid"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <div class="ticket" id="ticket-content"></div>
      <button class="close-btn" onclick="closeModal()">关闭</button>
    </div>
  </div>

  <script>
    const rooms = [];
    const bookings = [];
    let currentDate = new Date();
    let selectedDate = null;
    let selectedRoom = null;
    let selectedTimeSlot = null;

    const timeSlots = [
      '08:00', '08:30', '09:00', '09:30', '10:00', '10:30',
      '11:00', '11:30', '12:00', '12:30', '13:00', '13:30',
      '14:00', '14:30', '15:00', '15:30', '16:00', '16:30',
      '17:00', '17:30', '18:00', '18:30', '19:00', '19:30',
      '20:00', '20:30', '21:00', '21:30', '22:00', '22:30',
      '23:00', '23:30'
    ];

    async function init() {
      await loadRooms();
      await loadBookings();
      renderCalendar();
      renderRooms();
      populateTimeSelects();
      document.querySelector('.scenario-buttons').addEventListener('click', handleScenarioClick);
    }

    async function loadRooms() {
      const response = await fetch('/api/rooms');
      const data = await response.json();
      rooms.length = 0;
      rooms.push(...data);
      const select = document.getElementById('room-select');
      select.innerHTML = '<option value="">请选择会议室</option>';
      rooms.forEach(room => {
        const option = document.createElement('option');
        option.value = room.id;
        option.textContent = room.name;
        select.appendChild(option);
      });
    }

    async function loadBookings() {
      const response = await fetch('/api/bookings');
      const data = await response.json();
      bookings.length = 0;
      bookings.push(...data);
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('current-month').textContent = `${year}年${month + 1}月`;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDay = firstDay.getDay();
      const totalDays = lastDay.getDate();

      const prevMonthLastDay = new Date(year, month, 0).getDate();
      const nextMonthStartDay = 42 - (startDay + totalDays);

      let html = '<div class="weekdays">';
      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      weekdays.forEach(day => {
        html += `<div class="weekday">${day}</div>`;
      });
      html += '</div>';

      html += '<div class="days-grid">';

      for (let i = startDay - 1; i >= 0; i--) {
        const day = prevMonthLastDay - i;
        html += `<div class="day-cell other-month" data-date="${getDateString(new Date(year, month - 1, day))}">${day}</div>`;
      }

      const today = new Date().toISOString().split('T')[0];
      const selected = selectedDate ? selectedDate.toISOString().split('T')[0] : null;

      for (let i = 1; i <= totalDays; i++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        const dayBookings = bookings.filter(b => b.date === dateStr);
        const hasBooking = dayBookings.length > 0;
        const isToday = dateStr === today;
        const isSelected = dateStr === selected;
        
        let classes = 'day-cell';
        if (isToday) classes += ' today';
        if (isSelected) classes += ' selected';
        if (hasBooking) classes += ' has-booking';

        html += `<div class="${classes}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">${i}`;
        if (hasBooking) {
          html += '<div class="booking-dots">';
          const dots = Math.min(dayBookings.length, 3);
          for (let j = 0; j < dots; j++) {
            html += '<span class="booking-dot"></span>';
          }
          if (dayBookings.length > 3) {
            html += `<span class="booking-dot more">+${dayBookings.length - 3}</span>`;
          }
          html += '</div>';
        }
        html += '</div>';
      }

      for (let i = 1; i <= nextMonthStartDay; i++) {
        html += `<div class="day-cell other-month" data-date="${getDateString(new Date(year, month + 1, i))}">${i}</div>`;
      }

      html += '</div>';

      document.getElementById('calendar-grid').innerHTML = html;
    }

    function getDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function selectDate(dateStr) {
      selectedDate = new Date(dateStr);
      document.getElementById('booking-date').value = dateStr;
      renderCalendar();
      renderRooms();
    }

    function prevMonth() {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
      renderCalendar();
    }

    function nextMonth() {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
      renderCalendar();
    }

    function populateTimeSelects() {
      const startSelect = document.getElementById('start-time');
      const endSelect = document.getElementById('end-time');
      
      startSelect.innerHTML = '<option value="">选择开始时间</option>';
      endSelect.innerHTML = '<option value="">选择结束时间</option>';
      
      timeSlots.forEach(slot => {
        const startOption = document.createElement('option');
        startOption.value = slot;
        startOption.textContent = slot;
        startSelect.appendChild(startOption);
        
        const endOption = document.createElement('option');
        endOption.value = slot;
        endOption.textContent = slot;
        endSelect.appendChild(endOption);
      });
    }

    function renderRooms() {
      const dateStr = selectedDate ? selectedDate.toISOString().split('T')[0] : new Date().toISOString().split('T')[0];
      document.getElementById('rooms-section').querySelector('h3').textContent = `${dateStr} 会议室时段`;

      let html = '';
      rooms.forEach(room => {
        const roomBookings = bookings.filter(b => b.room_id === room.id && b.date === dateStr);
        html += `
          <div class="room-card">
            <div class="room-header">
              <span class="room-name">${room.name}</span>
              <span class="room-capacity">${room.capacity}人</span>
            </div>
            <div class="room-location">${room.location}</div>
            <div class="time-slots">
        `;
        
        timeSlots.forEach(slot => {
          const booking = roomBookings.find(b => isSlotBooked(b, slot));
          let classes = 'time-slot';
          let tooltipContent = '';
          
          if (booking) {
            classes += ' booked';
            const hasConflict = roomBookings.filter(b => b.id !== booking.id && 
              isTimeOverlap(b.start_time, b.end_time, booking.start_time, booking.end_time)).length > 0;
            if (hasConflict) {
              classes += ' conflict';
            }
            tooltipContent = `<strong>${booking.applicant}</strong><br>${booking.start_time} - ${booking.end_time}<br><button onclick="cancelBooking(${booking.id})">取消预订</button>`;
          } else {
            classes += ' available';
            tooltipContent = '点击预订此时段';
          }
          
          html += `<div class="${classes}" data-room="${room.id}" data-slot="${slot}" data-booking="${booking?.id || ''}" title="${tooltipContent}" onmouseenter="showTooltip(this)" onmouseleave="hideTooltip()">${slot}</div>`;
        });
        
        html += '</div></div>';
      });
      
      document.getElementById('rooms-grid').innerHTML = html;
    }

    function isSlotBooked(booking, slot) {
      const slotMinutes = getMinutes(slot);
      const startMinutes = getMinutes(booking.start_time);
      const endMinutes = getMinutes(booking.end_time);
      return slotMinutes >= startMinutes && slotMinutes < endMinutes;
    }

    function isTimeOverlap(start1, end1, start2, end2) {
      const s1 = getMinutes(start1);
      const e1 = getMinutes(end1);
      const s2 = getMinutes(start2);
      const e2 = getMinutes(end2);
      return (s1 < e2 && e1 > s2);
    }

    function getMinutes(time) {
      const [hours, minutes] = time.split(':').map(Number);
      return hours * 60 + minutes;
    }

    function showTooltip(element) {
      const tooltip = document.createElement('div');
      tooltip.className = 'tooltip';
      tooltip.innerHTML = element.getAttribute('title') + '<div class="tooltip-arrow"></div>';
      document.body.appendChild(tooltip);

      const rect = element.getBoundingClientRect();
      tooltip.style.left = `${rect.left + rect.width / 2 - tooltip.offsetWidth / 2}px`;
      tooltip.style.top = `${rect.top - tooltip.offsetHeight - 10}px`;

      setTimeout(() => tooltip.classList.add('visible'), 10);
    }

    function hideTooltip() {
      const tooltip = document.querySelector('.tooltip');
      if (tooltip) {
        tooltip.remove();
      }
    }

    async function submitBooking() {
      const applicant = document.getElementById('applicant').value;
      const roomId = document.getElementById('room-select').value;
      const date = document.getElementById('booking-date').value;
      const startTime = document.getElementById('start-time').value;
      const endTime = document.getElementById('end-time').value;

      if (!applicant || !roomId || !date || !startTime || !endTime) {
        showMessage('请填写所有必填项', 'error');
        return;
      }

      if (endTime <= startTime) {
        showMessage('结束时间必须晚于开始时间', 'error');
        return;
      }

      const startMinutes = getMinutes(startTime);
      const endMinutes = getMinutes(endTime);
      if (endMinutes < startMinutes) {
        showMessage('结束时间不能早于开始时间', 'error');
        return;
      }

      const response = await fetch('/api/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room_id: parseInt(roomId), applicant, date, start_time: startTime, end_time: endTime })
      });

      const result = await response.json();

      if (result.success) {
        bookings.push(result.booking);
        renderRooms();
        showTicket(result.booking);
      } else {
        showMessage(result.message, 'error');
      }
    }

    function showMessage(message, type) {
      const container = document.querySelector('.booking-form');
      const existingMessage = container.querySelector('.error-message, .success-message, .warning-message');
      if (existingMessage) existingMessage.remove();

      const messageDiv = document.createElement('div');
      messageDiv.className = `${type}-message`;
      messageDiv.textContent = message;
      container.insertBefore(messageDiv, container.firstChild);

      setTimeout(() => messageDiv.remove(), 3000);
    }

    function showTicket(booking) {
      const ticketContent = `
        <h3>预订成功</h3>
        <div class="ticket-info"><label>会议室：</label><span>${booking.name}</span></div>
        <div class="ticket-info"><label>申请人：</label><span>${booking.applicant}</span></div>
        <div class="ticket-info"><label>日期：</label><span>${booking.date}</span></div>
        <div class="ticket-info"><label>时间：</label><span>${booking.start_time} - ${booking.end_time}</span></div>
        <div class="ticket-info"><label>地点：</label><span>${booking.location}</span></div>
        <div class="ticket-info"><label>容量：</label><span>${booking.capacity}人</span></div>
      `;
      document.getElementById('ticket-content').innerHTML = ticketContent;
      document.getElementById('modal-overlay').classList.add('visible');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('visible');
    }

    async function cancelBooking(bookingId) {
      const element = document.querySelector(`[data-booking="${bookingId}"]`);
      if (element) {
        element.classList.add('slot-clearing');
        setTimeout(async () => {
          const response = await fetch(`/api/bookings/${bookingId}`, { method: 'DELETE' });
          const result = await response.json();
          if (result.success) {
            const index = bookings.findIndex(b => b.id === bookingId);
            if (index > -1) bookings.splice(index, 1);
            renderRooms();
          } else {
            showMessage(result.message, 'error');
          }
        }, 400);
      }
    }

    async function handleScenarioClick(e) {
      if (e.target.classList.contains('scenario-btn')) {
        const scenario = e.target.dataset.scenario;
        const response = await fetch('/api/scenario', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scenario })
        });
        const result = await response.json();
        if (result.success) {
          await loadBookings();
          renderCalendar();
          renderRooms();
          showMessage(result.message, 'success');
        }
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
