<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简约账本</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>简约账本</h1>
      <div class="month-selector">
        <label>月份筛选：</label>
        <select id="monthSelect">
          <option value="">全部月份</option>
        </select>
      </div>
    </header>

    <section class="presets">
      <h2>场景预设</h2>
      <div class="preset-buttons">
        <button class="preset-btn" data-preset="normal-monthly">普通上班族月度账单</button>
        <button class="preset-btn" data-preset="large-expense">只有大额支出的异常月</button>
        <button class="preset-btn" data-preset="zero-balance">收支完全相抵的零结余</button>
        <button class="preset-btn" data-preset="special-symbols">包含特殊符号备注的账单</button>
      </div>
    </section>

    <div class="main-layout">
      <div class="left-column">
        <section class="input-form">
          <h2>记一笔</h2>
          <form id="recordForm">
            <div class="type-toggle">
              <button type="button" class="type-btn active" data-type="expense">支出</button>
              <button type="button" class="type-btn" data-type="income">收入</button>
            </div>
            <div class="form-group">
              <label>金额</label>
              <input type="text" id="amountInput" placeholder="请输入数字金额" autocomplete="off">
              <span class="error-msg" id="amountError"></span>
            </div>
            <div class="form-group">
              <label>分类</label>
              <select id="categorySelect"></select>
            </div>
            <div class="form-group">
              <label>备注</label>
              <input type="text" id="noteInput" placeholder="可选备注" autocomplete="off">
            </div>
            <div class="form-group">
              <label>日期</label>
              <input type="date" id="dateInput">
            </div>
            <button type="submit" class="submit-btn">
              <span class="btn-text">确认添加</span>
              <span class="checkmark">✓</span>
            </button>
          </form>
        </section>

        <section class="stats">
          <h2>本月统计</h2>
          <div class="stats-grid">
            <div class="stat-card income">
              <div class="stat-label">收入</div>
              <div class="stat-value" id="totalIncome">0.00</div>
            </div>
            <div class="stat-card expense">
              <div class="stat-label">支出</div>
              <div class="stat-value" id="totalExpense">0.00</div>
            </div>
            <div class="stat-card balance">
              <div class="stat-label">结余</div>
              <div class="stat-value" id="totalBalance">0.00</div>
            </div>
          </div>
          <div class="chart-container">
            <canvas id="pieChart" width="280" height="280"></canvas>
            <div class="chart-empty" id="chartEmpty">暂无支出数据</div>
          </div>
        </section>
      </div>

      <div class="right-column">
        <section class="records-list">
          <h2>账单记录</h2>
          <div class="records-wrapper" id="recordsWrapper">
            <div class="empty-state" id="emptyState">
              <div class="empty-icon">📭</div>
              <p>暂无账单记录</p>
              <p class="empty-hint">点击上方"记一笔"添加，或使用预设场景</p>
            </div>
            <ul id="recordsList"></ul>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
