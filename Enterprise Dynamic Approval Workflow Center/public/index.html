<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级动态审批工作流中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏢 企业级动态审批工作流中心</h1>
            <nav>
                <button class="nav-btn active" data-tab="editor">流程编辑器</button>
                <button class="nav-btn" data-tab="applications">申请列表</button>
                <button class="nav-btn" data-tab="demo">演示效果</button>
            </nav>
        </header>

        <main>
            <section id="editor" class="tab-content active">
                <div class="editor-container">
                    <div class="sidebar">
                        <h3>节点库</h3>
                        <div class="node-library">
                            <div class="node-template" draggable="true" data-type="start" data-role="employee">
                                <div class="node-icon">🚀</div>
                                <div class="node-label">发起</div>
                            </div>
                            <div class="node-template" draggable="true" data-type="approval" data-role="manager">
                                <div class="node-icon">👔</div>
                                <div class="node-label">部门主管</div>
                            </div>
                            <div class="node-template" draggable="true" data-type="approval" data-role="finance">
                                <div class="node-icon">💰</div>
                                <div class="node-label">财务复核</div>
                            </div>
                            <div class="node-template" draggable="true" data-type="approval" data-role="ceo">
                                <div class="node-icon">👑</div>
                                <div class="node-label">总经理</div>
                            </div>
                            <div class="node-template" draggable="true" data-type="end">
                                <div class="node-icon">✅</div>
                                <div class="node-label">结束</div>
                            </div>
                        </div>
                        <div class="actions">
                            <input type="text" id="workflowName" placeholder="流程名称" value="请假审批流程">
                            <button id="saveWorkflow" class="btn primary">保存流程</button>
                            <button id="clearCanvas" class="btn danger">清空画布</button>
                        </div>
                    </div>
                    <div class="canvas-container">
                        <div class="canvas-toolbar">
                            <span>拖拽节点到画布，从节点右侧拖出连线到下一个节点</span>
                        </div>
                        <svg id="canvas" class="canvas"></svg>
                    </div>
                </div>
            </section>

            <section id="applications" class="tab-content">
                <div class="applications-container">
                    <div class="toolbar">
                        <button id="newApplication" class="btn primary">+ 新建请假申请</button>
                    </div>
                    <div id="applicationsList" class="applications-list"></div>
                </div>
            </section>

            <section id="demo" class="tab-content">
                <div class="demo-container">
                    <h2>演示效果</h2>
                    <div class="demo-buttons">
                        <button class="demo-btn" data-demo="perfect">完美流转</button>
                        <button class="demo-btn" data-demo="reject">连环驳回</button>
                        <button class="demo-btn" data-demo="countersign">会签卡点</button>
                        <button class="demo-btn" data-demo="withdraw">发起人撤销</button>
                    </div>
                    <div id="demoArea" class="demo-area"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
