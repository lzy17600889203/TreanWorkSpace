<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>强密码生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .password-display {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      position: relative;
    }

    #password {
      font-family: 'Courier New', monospace;
      font-size: 1.5rem;
      color: #00ff88;
      letter-spacing: 3px;
      min-height: 2.5rem;
      word-break: break-all;
    }

    .password-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #1a1a2e;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(79, 172, 254, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-copy {
      position: relative;
    }

    .copy-success {
      animation: successPop 0.6s ease;
    }

    @keyframes successPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .strength-section {
      margin-bottom: 20px;
    }

    .strength-label {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .strength-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease, background 0.5s ease;
    }

    .strength-weak { background: #ff4757; }
    .strength-fair { background: #ffa502; }
    .strength-good { background: #2ed573; }
    .strength-strong { background: #00ff88; }

    .settings-section {
      margin-bottom: 20px;
    }

    .settings-title {
      color: #fff;
      font-size: 1.2rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .length-control {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .length-label {
      color: #fff;
      min-width: 120px;
    }

    #length {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      outline: none;
    }

    #length::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #4facfe;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
    }

    #length::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    #length-value {
      color: #4facfe;
      font-weight: bold;
      font-size: 1.5rem;
      min-width: 40px;
    }

    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .checkbox-item:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4facfe;
    }

    .checkbox-item label {
      color: #fff;
      cursor: pointer;
      user-select: none;
    }

    .presets-section {
      margin-bottom: 20px;
    }

    .presets-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .preset-btn {
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
    }

    .preset-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }

    .preset-btn.active {
      border-color: #4facfe;
      background: rgba(79, 172, 254, 0.2);
    }

    .preset-name {
      color: #fff;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .preset-desc {
      color: #aaa;
      font-size: 0.85rem;
    }

    .history-section {
      max-height: 400px;
      overflow-y: auto;
    }

    .history-title {
      color: #fff;
      font-size: 1.2rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-list {
      list-style: none;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 12px;
      animation: slideIn 0.5s ease forwards;
      opacity: 0;
    }

    .history-item:nth-child(odd) {
      animation-delay: 0.1s;
    }

    .history-item:nth-child(even) {
      animation-delay: 0.2s;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .history-password {
      flex: 1;
      font-family: 'Courier New', monospace;
      color: #00ff88;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    .history-strength {
      width: 60px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .history-strength-fill {
      height: 100%;
      border-radius: 3px;
    }

    .history-time {
      color: #888;
      font-size: 0.8rem;
      min-width: 80px;
    }

    .history-delete {
      background: none;
      border: none;
      color: #ff4757;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .history-delete:hover {
      background: rgba(255, 71, 87, 0.2);
    }

    .error-message {
      background: rgba(255, 71, 87, 0.2);
      border: 1px solid #ff4757;
      border-radius: 8px;
      padding: 12px;
      color: #ff4757;
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .slot-machine {
      display: inline-block;
      animation: slotRoll 0.3s linear infinite;
    }

    @keyframes slotRoll {
      0% { transform: translateY(0); }
      100% { transform: translateY(-20px); }
    }

    .typing-cursor::after {
      content: '|';
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .presets-grid {
        grid-template-columns: 1fr;
      }
      
      .checkbox-group {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 强密码生成器</h1>
    
    <div class="card">
      <div class="password-display">
        <div id="password" class="typing-cursor">点击生成按钮创建密码</div>
      </div>
      
      <div class="strength-section">
        <div class="strength-label">
          <span>密码强度</span>
          <span id="strength-text">未检测</span>
        </div>
        <div class="strength-bar">
          <div id="strength-fill" class="strength-fill" style="width: 0%"></div>
        </div>
      </div>
      
      <div class="password-actions">
        <button class="btn btn-primary" id="generate-btn">
          <span>🔄</span>
          <span>生成密码</span>
        </button>
        <button class="btn btn-secondary btn-copy" id="copy-btn" disabled>
          <span id="copy-icon">📋</span>
          <span>复制</span>
        </button>
      </div>
    </div>

    <div class="card">
      <div class="presets-section">
        <div class="settings-title">🎯 预设场景</div>
        <div class="presets-grid" id="presets-grid">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="settings-section">
        <div class="settings-title">⚙️ 自定义设置</div>
        
        <div class="length-control">
          <span class="length-label">密码长度</span>
          <input type="range" id="length" min="1" max="64" value="16">
          <span id="length-value">16</span>
        </div>
        
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="uppercase" checked>
            <label for="uppercase">大写字母 (A-Z)</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="lowercase" checked>
            <label for="lowercase">小写字母 (a-z)</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="numbers" checked>
            <label for="numbers">数字 (0-9)</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="symbols" checked>
            <label for="symbols">特殊符号 (!@#$%)</label>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="history-section">
        <div class="history-title">📜 历史记录</div>
        <ul id="history-list" class="history-list">
          <li style="color: #888; text-align: center; padding: 20px;">暂无历史记录</li>
        </ul>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let currentPassword = '';
    let isGenerating = false;

    async function fetchPresets() {
      const response = await fetch(`${API_BASE}/api/presets`);
      const presets = await response.json();
      const grid = document.getElementById('presets-grid');
      presets.forEach(preset => {
        const button = document.createElement('button');
        button.className = 'preset-btn';
        button.dataset.id = preset.id;
        button.innerHTML = `
          <div class="preset-name">${preset.name}</div>
          <div class="preset-desc">${preset.description}</div>
        `;
        button.addEventListener('click', () => applyPreset(preset));
        grid.appendChild(button);
      });
    }

    async function applyPreset(preset) {
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector(`[data-id="${preset.id}"]`).classList.add('active');
      
      document.getElementById('length').value = preset.config.length;
      document.getElementById('length-value').textContent = preset.config.length;
      document.getElementById('uppercase').checked = preset.config.uppercase;
      document.getElementById('lowercase').checked = preset.config.lowercase;
      document.getElementById('numbers').checked = preset.config.numbers;
      document.getElementById('symbols').checked = preset.config.symbols;
      
      await savePreferences();
    }

    async function fetchHistory() {
      const response = await fetch(`${API_BASE}/api/history`);
      const history = await response.json();
      renderHistory(history);
    }

    function renderHistory(history) {
      const list = document.getElementById('history-list');
      
      if (history.length === 0) {
        list.innerHTML = '<li style="color: #888; text-align: center; padding: 20px;">暂无历史记录</li>';
        return;
      }
      
      list.innerHTML = '';
      
      history.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.style.opacity = '0';
        li.style.animation = `slideIn 0.5s ease forwards`;
        li.style.animationDelay = `${(index % 2 === 0 ? 0.1 : 0.2) + (Math.floor(index / 2) * 0.1)}s`;
        
        li.innerHTML = `
          <span class="history-password">${escapeHtml(item.password)}</span>
          <div class="history-strength">
            <div class="history-strength-fill" style="width: ${item.strength}%; ${getStrengthColor(item.strength)}"></div>
          </div>
          <span class="history-time">${formatTime(item.timestamp)}</span>
          <button class="history-delete" onclick="deleteHistory(${item.id})">🗑️</button>
        `;
        
        list.appendChild(li);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString('zh-CN', { 
        month: '2-digit', 
        day: '2-digit', 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }

    function getStrengthColor(strength) {
      if (strength < 30) return 'background: #ff4757;';
      if (strength < 60) return 'background: #ffa502;';
      if (strength < 80) return 'background: #2ed573;';
      return 'background: #00ff88;';
    }

    function getStrengthText(strength) {
      if (strength < 30) return '弱';
      if (strength < 60) return '一般';
      if (strength < 80) return '良好';
      return '强';
    }

    async function deleteHistory(id) {
      await fetch(`${API_BASE}/api/history/${id}`, { method: 'DELETE' });
      fetchHistory();
    }

    async function savePreferences() {
      const preferences = {
        length: document.getElementById('length').value,
        uppercase: document.getElementById('uppercase').checked,
        lowercase: document.getElementById('lowercase').checked,
        numbers: document.getElementById('numbers').checked,
        symbols: document.getElementById('symbols').checked
      };
      await fetch(`${API_BASE}/api/preferences`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(preferences)
      });
    }

    async function loadPreferences() {
      const response = await fetch(`${API_BASE}/api/preferences`);
      const prefs = await response.json();
      
      document.getElementById('length').value = prefs.length || 16;
      document.getElementById('length-value').textContent = prefs.length || 16;
      document.getElementById('uppercase').checked = prefs.uppercase !== false;
      document.getElementById('lowercase').checked = prefs.lowercase !== false;
      document.getElementById('numbers').checked = prefs.numbers !== false;
      document.getElementById('symbols').checked = prefs.symbols !== false;
    }

    async function generatePassword() {
      if (isGenerating) return;
      
      isGenerating = true;
      const generateBtn = document.getElementById('generate-btn');
      const passwordEl = document.getElementById('password');
      const copyBtn = document.getElementById('copy-btn');
      
      generateBtn.disabled = true;
      copyBtn.disabled = true;
      
      document.querySelectorAll('.error-message').forEach(el => el.remove());
      
      passwordEl.classList.add('slot-machine');
      
      const allChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
      const length = parseInt(document.getElementById('length').value);
      let slotInterval;
      const slotChars = [];
      
      for (let i = 0; i < length; i++) {
        slotChars.push(allChars[Math.floor(Math.random() * allChars.length)]);
      }
      passwordEl.textContent = slotChars.join('');
      
      slotInterval = setInterval(() => {
        for (let i = 0; i < slotChars.length; i++) {
          if (Math.random() > 0.7) {
            slotChars[i] = allChars[Math.floor(Math.random() * allChars.length)];
          }
        }
        passwordEl.textContent = slotChars.join('');
      }, 50);
      
      const uppercase = document.getElementById('uppercase').checked;
      const lowercase = document.getElementById('lowercase').checked;
      const numbers = document.getElementById('numbers').checked;
      const symbols = document.getElementById('symbols').checked;
      
      const params = new URLSearchParams({
        length,
        uppercase,
        lowercase,
        numbers,
        symbols
      });
      
      try {
        const response = await fetch(`${API_BASE}/api/generate?${params}`);
        const data = await response.json();
        
        clearInterval(slotInterval);
        
        if (!data.success) {
          passwordEl.classList.remove('slot-machine');
          passwordEl.textContent = '';
          const errorDiv = document.createElement('div');
          errorDiv.className = 'error-message';
          errorDiv.textContent = data.error;
          document.querySelector('.card').insertBefore(errorDiv, document.querySelector('.password-display'));
          return;
        }
        
        currentPassword = data.password;
        passwordEl.classList.remove('slot-machine');
        await typeWriterEffect(passwordEl, data.password);
        updateStrength(data.strength);
        copyBtn.disabled = false;
        fetchHistory();
      } catch (error) {
        clearInterval(slotInterval);
        passwordEl.classList.remove('slot-machine');
        passwordEl.textContent = '';
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-message';
        errorDiv.textContent = '服务器错误，请稍后重试';
        document.querySelector('.card').insertBefore(errorDiv, document.querySelector('.password-display'));
      } finally {
        isGenerating = false;
        generateBtn.disabled = false;
      }
    }

    async function typeWriterEffect(element, text) {
      element.textContent = '';
      element.classList.remove('typing-cursor');
      
      for (let i = 0; i < text.length; i++) {
        element.textContent += text[i];
        await new Promise(resolve => setTimeout(resolve, 50));
      }
      
      element.classList.add('typing-cursor');
    }

    function updateStrength(strength) {
      const fill = document.getElementById('strength-fill');
      const text = document.getElementById('strength-text');
      
      fill.style.width = `${strength}%`;
      fill.className = `strength-fill ${
        strength < 30 ? 'strength-weak' :
        strength < 60 ? 'strength-fair' :
        strength < 80 ? 'strength-good' : 'strength-strong'
      }`;
      text.textContent = getStrengthText(strength);
    }

    async function copyPassword() {
      if (!currentPassword) return;
      
      const copyBtn = document.getElementById('copy-btn');
      const copyIcon = document.getElementById('copy-icon');
      
      try {
        await navigator.clipboard.writeText(currentPassword);
        copyIcon.textContent = '✅';
        copyBtn.classList.add('copy-success');
        
        setTimeout(() => {
          copyIcon.textContent = '📋';
          copyBtn.classList.remove('copy-success');
        }, 2000);
      } catch (error) {
        const textarea = document.createElement('textarea');
        textarea.value = currentPassword;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        
        copyIcon.textContent = '✅';
        copyBtn.classList.add('copy-success');
        
        setTimeout(() => {
          copyIcon.textContent = '📋';
          copyBtn.classList.remove('copy-success');
        }, 2000);
      }
    }

    document.getElementById('generate-btn').addEventListener('click', generatePassword);
    document.getElementById('copy-btn').addEventListener('click', copyPassword);
    document.getElementById('length').addEventListener('input', (e) => {
      document.getElementById('length-value').textContent = e.target.value;
      savePreferences();
    });
    
    ['uppercase', 'lowercase', 'numbers', 'symbols'].forEach(id => {
      document.getElementById(id).addEventListener('change', savePreferences);
    });

    document.addEventListener('DOMContentLoaded', () => {
      fetchPresets();
      loadPreferences();
      fetchHistory();
    });
  </script>
</body>
</html>
