<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄工作法计时器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      transition: background 1s ease;
    }
    body.break-mode { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 30px 0; }
    header h1 { color: white; font-size: 2.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px; }
    header p { color: rgba(255,255,255,0.8); font-size: 1.1rem; }
    
    .presets { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    .preset-btn {
      padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.3s ease; background: rgba(255,255,255,0.2); color: white; backdrop-filter: blur(5px);
    }
    .preset-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
    .preset-btn.active { background: rgba(255,255,255,0.4); transform: scale(1.05); }
    
    .timer-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
    
    .duration-input { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .duration-input label { color: white; font-size: 1.1rem; }
    .duration-input input {
      width: 80px; padding: 10px 15px; border: none; border-radius: 10px; font-size: 1.2rem;
      text-align: center; background: rgba(255,255,255,0.9); color: #333;
    }
    
    .timer-container { position: relative; width: 300px; height: 300px; margin-bottom: 20px; }
    .timer-ring {
      width: 100%; height: 100%; border-radius: 50%;
      background: conic-gradient(#ff6b6b 0deg, #feca57 60deg, #48dbfb 120deg, #1dd1a1 180deg, #5f27cd 240deg, #ff6b6b 300deg, #feca57 360deg);
      padding: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); animation: pulse 2s ease-in-out infinite;
    }
    .timer-ring-inner {
      width: 100%; height: 100%; border-radius: 50%; background: rgba(255,255,255,0.95);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .timer-display { font-size: 4rem; font-weight: bold; color: #333; font-family: 'Courier New', monospace; }
    .timer-label { font-size: 1rem; color: #666; margin-top: 5px; }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
      50% { box-shadow: 0 15px 50px rgba(0,0,0,0.4); }
    }
    
    .controls { display: flex; gap: 20px; }
    .control-btn {
      padding: 15px 40px; border: none; border-radius: 30px; cursor: pointer; font-size: 1.1rem;
      font-weight: 600; transition: all 0.3s ease; position: relative; overflow: hidden;
    }
    .control-btn::before {
      content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
      background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    .control-btn:hover::before { width: 300px; height: 300px; }
    
    .btn-start { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
    .btn-pause { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
    .btn-resume { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; }
    .btn-stop { background: linear-gradient(135deg, #434343 0%, #000000 100%); color: white; }
    .btn-break { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
    
    .stats-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card {
      background: rgba(255,255,255,0.95); border-radius: 15px; padding: 20px; text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: transform 0.3s ease;
    }
    .stat-card:hover { transform: translateY(-5px); }
    .stat-value { font-size: 2rem; font-weight: bold; color: #667eea; }
    .stat-label { font-size: 0.9rem; color: #666; margin-top: 5px; }
    
    .history-section {
      background: rgba(255,255,255,0.95); border-radius: 15px; padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    .history-section h2 { color: #333; margin-bottom: 20px; font-size: 1.5rem; }
    .history-list { max-height: 300px; overflow-y: auto; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px; border-bottom: 1px solid #eee;
      animation: fadeIn 0.5s ease forwards; opacity: 0;
    }
    .history-item:nth-child(n) { animation-delay: calc(n * 0.1s); }
    .history-item:last-child { border-bottom: none; }
    .history-item.interrupted { background: rgba(255, 107, 107, 0.1); }
    .history-info { display: flex; flex-direction: column; }
    .history-time { font-weight: 600; color: #333; }
    .history-date { font-size: 0.85rem; color: #999; margin-top: 3px; }
    .history-duration { font-size: 1.2rem; font-weight: bold; color: #1dd1a1; }
    .history-duration.interrupted { color: #ff6b6b; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .confetti-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 9999;
    }
    .confetti {
      position: absolute; width: 10px; height: 10px; top: -10px;
      animation: confetti-fall linear infinite;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    .sync-warning {
      background: rgba(255, 193, 7, 0.2); border-left: 4px solid #ffc107;
      padding: 15px; margin-bottom: 20px; border-radius: 0 10px 10px 0;
      display: none;
    }
    .sync-warning.show { display: block; animation: slideIn 0.3s ease; }
    @keyframes slideIn {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍅 番茄工作法计时器</h1>
      <p>专注时间管理，提升工作效率</p>
    </header>

    <div class="sync-warning" id="syncWarning">⚠️ 检测到时间同步误差！浏览器后台运行可能导致倒计时不准确。</div>

    <div class="presets">
      <button class="preset-btn" data-preset="standard">标准25分钟工作流</button>
      <button class="preset-btn" data-preset="fragmented">碎片化记录</button>
      <button class="preset-btn" data-preset="challenge">8小时极限挑战</button>
      <button class="preset-btn" data-preset="initial">初始态</button>
    </div>

    <div class="timer-section">
      <div class="duration-input">
        <label for="duration">专注时长（分钟）:</label>
        <input type="number" id="duration" min="1" max="1440" value="25">
      </div>

      <div class="timer-container">
        <div class="timer-ring">
          <div class="timer-ring-inner">
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-label" id="timerLabel">准备开始专注</div>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="control-btn btn-start" id="btnStart">开始专注</button>
        <button class="control-btn btn-pause" id="btnPause" style="display: none;">暂停专注</button>
        <button class="control-btn btn-resume" id="btnResume" style="display: none;">继续专注</button>
        <button class="control-btn btn-stop" id="btnStop" style="display: none;">结束专注</button>
        <button class="control-btn btn-break" id="btnBreak" style="display: none;">切换休息模式</button>
      </div>
    </div>

    <div class="stats-section">
      <div class="stat-card">
        <div class="stat-value" id="statToday">0小时</div>
        <div class="stat-label">今日专注时长</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTotal">0小时</div>
        <div class="stat-label">总专注时长</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSessions">0次</div>
        <div class="stat-label">专注次数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statInterrupted">0次</div>
        <div class="stat-label">被打断次数</div>
      </div>
    </div>

    <div class="history-section">
      <h2>📋 专注历史记录</h2>
      <div class="history-list" id="historyList">
        <p style="text-align: center; color: #999;">暂无专注记录</p>
      </div>
    </div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    let timerInterval = null;
    let startTime = null;
    let remainingSeconds = 0;
    let totalSeconds = 0;
    let isRunning = false;
    let isPaused = false;
    let isBreakMode = false;
    let lastTimeCheck = Date.now();
    let syncErrors = 0;

    const timerDisplay = document.getElementById('timerDisplay');
    const timerLabel = document.getElementById('timerLabel');
    const durationInput = document.getElementById('duration');
    const btnStart = document.getElementById('btnStart');
    const btnPause = document.getElementById('btnPause');
    const btnResume = document.getElementById('btnResume');
    const btnStop = document.getElementById('btnStop');
    const btnBreak = document.getElementById('btnBreak');
    const syncWarning = document.getElementById('syncWarning');
    const confettiContainer = document.getElementById('confettiContainer');

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function showConfetti() {
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd', '#ff9ff3'];
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + '%';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (3 + Math.random() * 2) + 's';
        confetti.style.width = (8 + Math.random() * 8) + 'px';
        confetti.style.height = (8 + Math.random() * 8) + 'px';
        confettiContainer.appendChild(confetti);
      }
      setTimeout(() => { confettiContainer.innerHTML = ''; }, 5000);
    }

    function startTimer() {
      if (isRunning) return;
      
      const duration = parseInt(durationInput.value) || 25;
      totalSeconds = duration * 60;
      remainingSeconds = totalSeconds;
      startTime = Date.now();
      isRunning = true;
      isPaused = false;
      lastTimeCheck = Date.now();
      syncErrors = 0;

      btnStart.style.display = 'none';
      btnPause.style.display = 'inline-block';
      btnStop.style.display = 'inline-block';
      btnResume.style.display = 'none';
      btnBreak.style.display = 'inline-block';
      syncWarning.classList.remove('show');

      timerLabel.textContent = isBreakMode ? '休息中...' : '专注进行中...';

      timerInterval = setInterval(() => {
        const now = Date.now();
        const elapsed = Math.floor((now - lastTimeCheck) / 1000);
        
        if (elapsed > 1) {
          syncErrors++;
          if (syncErrors >= 3) syncWarning.classList.add('show');
        }
        
        lastTimeCheck = now;
        remainingSeconds -= elapsed;

        if (remainingSeconds <= 0) {
          clearInterval(timerInterval);
          remainingSeconds = 0;
          isRunning = false;
          timerDisplay.textContent = '00:00';
          timerLabel.textContent = isBreakMode ? '休息结束！' : '专注完成！';
          
          if (!isBreakMode) {
            showConfetti();
            saveFocusRecord(startTime, Date.now(), totalSeconds, false);
          }
          
          return;
        }

        timerDisplay.textContent = formatTime(remainingSeconds);
      }, 100);
    }

    function pauseTimer() {
      if (!isRunning || isPaused) return;
      clearInterval(timerInterval);
      isPaused = true;
      btnPause.style.display = 'none';
      btnResume.style.display = 'inline-block';
      timerLabel.textContent = '已暂停';
    }

    function resumeTimer() {
      if (!isRunning || !isPaused) return;
      isPaused = false;
      lastTimeCheck = Date.now();
      
      btnResume.style.display = 'none';
      btnPause.style.display = 'inline-block';
      timerLabel.textContent = isBreakMode ? '休息中...' : '专注进行中...';

      timerInterval = setInterval(() => {
        const now = Date.now();
        const elapsed = Math.floor((now - lastTimeCheck) / 1000);
        
        if (elapsed > 1) {
          syncErrors++;
          if (syncErrors >= 3) syncWarning.classList.add('show');
        }
        
        lastTimeCheck = now;
        remainingSeconds -= elapsed;

        if (remainingSeconds <= 0) {
          clearInterval(timerInterval);
          remainingSeconds = 0;
          isRunning = false;
          timerDisplay.textContent = '00:00';
          timerLabel.textContent = isBreakMode ? '休息结束！' : '专注完成！';
          
          if (!isBreakMode) {
            showConfetti();
            saveFocusRecord(startTime, Date.now(), totalSeconds, false);
          }
          
          return;
        }

        timerDisplay.textContent = formatTime(remainingSeconds);
      }, 100);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      
      if (isRunning && startTime && !isBreakMode) {
        const actualDuration = Math.floor((Date.now() - startTime) / 1000);
        saveFocusRecord(startTime, Date.now(), actualDuration, true);
      }
      
      isRunning = false;
      isPaused = false;
      remainingSeconds = 0;
      totalSeconds = 0;
      
      btnStart.style.display = 'inline-block';
      btnPause.style.display = 'none';
      btnResume.style.display = 'none';
      btnStop.style.display = 'none';
      btnBreak.style.display = 'none';
      
      timerDisplay.textContent = formatTime(parseInt(durationInput.value) * 60);
      timerLabel.textContent = '准备开始专注';
      syncWarning.classList.remove('show');
      syncErrors = 0;
    }

    function toggleBreakMode() {
      isBreakMode = !isBreakMode;
      
      if (isBreakMode) {
        document.body.classList.add('break-mode');
        btnBreak.textContent = '返回专注模式';
        durationInput.value = '5';
        timerDisplay.textContent = '05:00';
      } else {
        document.body.classList.remove('break-mode');
        btnBreak.textContent = '切换休息模式';
        durationInput.value = '25';
        timerDisplay.textContent = '25:00';
      }
      
      if (!isRunning) {
        timerLabel.textContent = isBreakMode ? '准备休息' : '准备开始专注';
      }
    }

    async function saveFocusRecord(start, end, duration, interrupted) {
      try {
        const response = await fetch('/api/records', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            start_time: Math.floor(start / 1000),
            end_time: Math.floor(end / 1000),
            duration: duration,
            interrupted: interrupted
          })
        });
        
        if (!response.ok) {
          console.error('保存失败:', response.status);
          return;
        }
        
        await loadHistory();
        await loadStatistics();
      } catch (error) {
        console.error('保存记录失败:', error);
      }
    }

    async function loadHistory() {
      try {
        const response = await fetch('/api/records/today');
        if (!response.ok) return;
        
        const records = await response.json();
        const historyList = document.getElementById('historyList');
        
        if (records.length === 0) {
          historyList.innerHTML = '<p style="text-align: center; color: #999;">暂无专注记录</p>';
          return;
        }
        
        historyList.innerHTML = records.map((record, index) => `
          <div class="history-item ${record.interrupted ? 'interrupted' : ''}" style="animation-delay: ${index * 0.1}s;">
            <div class="history-info">
              <div class="history-time">${formatDateTime(record.start_time)}</div>
              <div class="history-date">${formatDate(record.start_time)}</div>
            </div>
            <div class="history-duration ${record.interrupted ? 'interrupted' : ''}">${formatDuration(record.duration)}</div>
          </div>
        `).join('');
      } catch (error) {
        console.error('加载历史记录失败:', error);
      }
    }

    function formatDateTime(timestamp) {
      const date = new Date(timestamp * 1000);
      return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp * 1000);
      return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', weekday: 'short' });
    }

    function formatDuration(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      return hours > 0 ? `${hours}小时${minutes}分钟` : `${minutes}分钟`;
    }

    async function loadStatistics() {
      try {
        const [todayStats, totalStats] = await Promise.all([
          fetch('/api/statistics?period=today').then(res => res.json()),
          fetch('/api/statistics').then(res => res.json())
        ]);
        
        document.getElementById('statToday').textContent = formatDuration(todayStats.total_duration || 0);
        document.getElementById('statTotal').textContent = formatDuration(totalStats.total_duration || 0);
        document.getElementById('statSessions').textContent = totalStats.total_sessions || 0;
        document.getElementById('statInterrupted').textContent = totalStats.interrupted_sessions || 0;
      } catch (error) {
        console.error('加载统计数据失败:', error);
      }
    }

    function applyPreset(preset) {
      document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
      
      switch(preset) {
        case 'standard':
          durationInput.value = '25';
          isBreakMode = false;
          document.body.classList.remove('break-mode');
          btnBreak.textContent = '切换休息模式';
          break;
        case 'fragmented':
          durationInput.value = '5';
          isBreakMode = false;
          document.body.classList.remove('break-mode');
          btnBreak.textContent = '切换休息模式';
          break;
        case 'challenge':
          durationInput.value = '480';
          isBreakMode = false;
          document.body.classList.remove('break-mode');
          btnBreak.textContent = '切换休息模式';
          break;
        case 'initial':
          durationInput.value = '25';
          isBreakMode = false;
          document.body.classList.remove('break-mode');
          btnBreak.textContent = '切换休息模式';
          stopTimer();
          break;
      }
      
      if (!isRunning) {
        timerDisplay.textContent = formatTime(parseInt(durationInput.value) * 60);
        timerLabel.textContent = '准备开始专注';
      }
      
      document.querySelector(`[data-preset="${preset}"]`).classList.add('active');
    }

    btnStart.addEventListener('click', startTimer);
    btnPause.addEventListener('click', pauseTimer);
    btnResume.addEventListener('click', resumeTimer);
    btnStop.addEventListener('click', stopTimer);
    btnBreak.addEventListener('click', toggleBreakMode);

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        applyPreset(this.dataset.preset);
      });
    });

    durationInput.addEventListener('change', function() {
      if (!isRunning) {
        timerDisplay.textContent = formatTime(parseInt(this.value) * 60);
      }
    });

    document.addEventListener('visibilitychange', function() {
      if (document.hidden && isRunning && !isPaused) {
        syncWarning.classList.add('show');
      }
    });

    document.addEventListener('DOMContentLoaded', function() {
      loadHistory();
      loadStatistics();
    });
  </script>
</body>
</html>
