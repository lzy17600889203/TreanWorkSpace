
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产研团队排期工具 - 甘特图</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>产研团队排期工具</h1>
            <div class="controls">
                <button id="btnAddTask">➕ 添加任务</button>
                <button id="btnPerfect">完美并行</button>
                <button id="btnOverload">严重过载</button>
                <button id="btnIdle">资源闲置</button>
                <button id="btnUrgent">突发插队</button>
                <button id="btnReset">重置</button>
            </div>
        </header>
        
        <!-- 添加任务弹窗 -->
        <div id="addTaskModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>添加新任务</h2>
                <form id="addTaskForm">
                    <div class="form-group">
                        <label for="taskTitle">任务名称</label>
                        <input type="text" id="taskTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="taskMember">分配给</label>
                        <select id="taskMember" required></select>
                    </div>
                    <div class="form-group">
                        <label for="taskStartDay">开始天数 (0-13)</label>
                        <input type="number" id="taskStartDay" min="0" max="13" value="0" required>
                    </div>
                    <div class="form-group">
                        <label for="taskDuration">持续天数 (1-14)</label>
                        <input type="number" id="taskDuration" min="1" max="14" value="1" required>
                    </div>
                    <div class="form-group">
                        <label for="taskColor">任务颜色</label>
                        <input type="color" id="taskColor" value="#4CAF50">
                    </div>
                    <button type="submit" class="submit-btn">添加任务</button>
                </form>
            </div>
        </div>
        
        <div class="gantt-container">
            <div class="gantt-header">
                <div class="member-header">成员</div>
                <div class="timeline-header" id="timelineHeader"></div>
            </div>
            <div class="gantt-body" id="ganttBody"></div>
        </div>
        <div id="toast" class="toast"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
