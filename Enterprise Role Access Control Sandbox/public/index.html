<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业角色权限访问控制可视化</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>🔐 权限拓扑可视化</h1>
            
            <div class="scenario-section">
                <h3>📋 演示场景</h3>
                <button class="scenario-btn" data-scenario="star">⭐ 超级管理员星型辐射</button>
                <button class="scenario-btn" data-scenario="ghost">👻 离职员工幽灵连线</button>
                <button class="scenario-btn" data-scenario="temp">⚠️ 临时提权高危链路</button>
                <button class="scenario-btn" data-scenario="maze">🔀 跨部门交叉授权迷宫</button>
            </div>
            
            <div class="legend-section">
                <h3>📖 图例</h3>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4ECDC4"></div>
                    <span>用户</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FFE66D"></div>
                    <span>角色</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #FF6B6B"></div>
                    <span>权限</span>
                </div>
            </div>
            
            <div class="instruction-section">
                <h3>💡 操作说明</h3>
                <p>• 拖拽节点调整位置</p>
                <p>• 双击节点删除</p>
                <p>• 点击连线断开授权</p>
                <p>• 拖动节点到另一个节点建立授权</p>
            </div>
        </div>
        
        <div class="main-content">
            <div class="canvas-container">
                <canvas id="topologyCanvas"></canvas>
            </div>
            
            <div class="alert-panel">
                <h3>🚨 越权访问告警</h3>
                <div id="alertContent">
                    <p class="no-alert">暂无告警</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
