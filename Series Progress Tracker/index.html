<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>追剧进度管理</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>📺 追剧进度管理</h1>
    
    <div class="add-form">
      <input type="text" id="seriesName" placeholder="剧名" required>
      <input type="number" id="totalEpisodes" placeholder="总集数（0表示连载中）" min="0">
      <button id="addBtn">添加</button>
    </div>

    <div id="seriesList" class="series-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
