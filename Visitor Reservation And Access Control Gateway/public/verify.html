<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保安核验台</title>
    <link rel="stylesheet" href="css/verify.css">
</head>
<body>
    <div class="verify-container" id="verifyContainer">
        <!-- 待机状态 -->
        <div class="state standby" id="standbyState">
            <div class="breathing-light"></div>
            <h2>请扫描访客二维码</h2>
            <div id="reader" class="scanner"></div>
        </div>

        <!-- 成功状态 -->
        <div class="state success hidden" id="successState">
            <svg class="checkmark" viewBox="0 0 52 52">
                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"></circle>
                <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"></path>
            </svg>
            <h2>核验通过</h2>
            <div class="info-display" id="successInfo"></div>
        </div>

        <!-- 过期状态 -->
        <div class="state expired hidden" id="expiredState">
            <svg class="cross" viewBox="0 0 52 52">
                <circle class="cross-circle" cx="26" cy="26" r="25" fill="none"></circle>
                <line class="cross-line cross-line-left" x1="16" y1="16" x2="36" y2="36" stroke="none"></line>
                <line class="cross-line cross-line-right" x1="36" y1="16" x2="16" y2="36" stroke="none"></line>
            </svg>
            <h2>预约已过期</h2>
            <div class="message-display" id="expiredMessage"></div>
        </div>

        <!-- 黑名单状态 -->
        <div class="state blacklist hidden" id="blacklistState">
            <div class="alert-overlay"></div>
            <div class="alert-box">
                <div class="alert-icon">!</div>
                <h2>黑名单预警</h2>
                <div class="message-display" id="blacklistMessage"></div>
            </div>
        </div>
    </div>

    <div class="test-buttons">
        <button onclick="testSuccess()">测试：通过</button>
        <button onclick="testExpired()">测试：过期</button>
        <button onclick="testBlacklist()">测试：黑名单</button>
    </div>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="js/verify.js"></script>
</body>
</html>
