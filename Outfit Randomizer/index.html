<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天穿什么？</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-orange: #FF9F43;
            --primary-orange-dark: #e88e36;
            --soft-beige: #F8F5F2;
            --soft-blue: #54A0FF;
            --soft-pink: #FF6B9D;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --card-shadow-hover: 0 15px 50px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #FFECD2 0%, #FCB69F 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--soft-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease-out;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .preset-section {
            background: white;
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: var(--card-shadow);
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .preset-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: var(--text-dark);
        }

        .preset-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .category-card {
            background: var(--soft-beige);
            border-radius: 16px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--card-shadow);
        }

        .category-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--primary-orange);
            text-align: center;
        }

        .item-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            background: white;
            padding: 12px 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s ease;
        }

        .item:hover {
            transform: scale(1.02);
        }

        .item-emoji {
            font-size: 1.8rem;
        }

        .item-name {
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .button-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .random-btn {
            background: linear-gradient(135deg, var(--primary-orange) 0%, var(--soft-pink) 100%);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.4rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 159, 67, 0.4);
            transition: all 0.3s ease;
            outline: none;
        }

        .random-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 159, 67, 0.5);
        }

        .random-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .random-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .result-section {
            display: none;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--card-shadow);
        }

        .result-section.show {
            display: block;
            animation: fadeInUp 0.6s ease-out;
        }

        .result-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-dark);
        }

        .result-grid {
            display: flex;
            flex-direction: row;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .result-item {
            flex: 1;
            min-width: 150px;
            max-width: 220px;
            background: linear-gradient(135deg, var(--soft-beige) 0%, white 100%);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .result-item.show {
            animation: bounceIn 0.6s ease-out forwards;
        }

        .result-item:nth-child(1).show {
            animation-delay: 0.1s;
        }

        .result-item:nth-child(2).show {
            animation-delay: 0.25s;
        }

        .result-item:nth-child(3).show {
            animation-delay: 0.4s;
        }

        .result-emoji {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }

        .result-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        .plus-sign {
            font-size: 1.8rem;
            color: var(--primary-orange);
            font-weight: 700;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.8);
            }
            50% {
                transform: translateY(-10px) scale(1.05);
            }
            70% {
                transform: translateY(5px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            .preset-grid {
                grid-template-columns: 1fr;
            }

            .preset-section {
                padding: 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .random-btn {
                padding: 16px 45px;
                font-size: 1.2rem;
            }

            .result-grid {
                gap: 10px;
            }

            .result-item {
                min-width: 110px;
                padding: 20px 12px;
            }

            .result-emoji {
                font-size: 2.8rem;
            }

            .result-name {
                font-size: 1rem;
            }

            .plus-sign {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👔 今天穿什么？</h1>
            <p class="subtitle">让我来帮你决定吧！</p>
        </header>

        <section class="preset-section">
            <h2 class="preset-title">✨ 我的衣橱</h2>
            <div class="preset-grid">
                <div class="category-card">
                    <h3 class="category-title">👕 上衣</h3>
                    <div class="item-list" id="tops-list"></div>
                </div>
                <div class="category-card">
                    <h3 class="category-title">👖 裤子</h3>
                    <div class="item-list" id="bottoms-list"></div>
                </div>
                <div class="category-card">
                    <h3 class="category-title">👟 鞋子</h3>
                    <div class="item-list" id="shoes-list"></div>
                </div>
            </div>
        </section>

        <section class="button-section">
            <button class="random-btn" id="random-btn">🎲 帮我搭</button>
        </section>

        <section class="result-section" id="result-section">
            <h2 class="result-title">🌟 今日穿搭</h2>
            <div class="result-grid" id="result-grid"></div>
        </section>
    </div>

    <script>
        const outfitData = {
            tops: [
                { name: "白T恤", emoji: "👕" },
                { name: "卫衣", emoji: "🧥" },
                { name: "衬衫", emoji: "👔" },
                { name: "毛衣", emoji: "🧶" },
                { name: "夹克", emoji: "🧥" }
            ],
            bottoms: [
                { name: "牛仔裤", emoji: "👖" },
                { name: "运动裤", emoji: "🏃" },
                { name: "休闲裤", emoji: "👖" }
            ],
            shoes: [
                { name: "运动鞋", emoji: "👟" },
                { name: "板鞋", emoji: "👞" }
            ]
        };

        function renderPresetList(items, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = items.map(item => `
                <div class="item">
                    <span class="item-emoji">${item.emoji}</span>
                    <span class="item-name">${item.name}</span>
                </div>
            `).join('');
        }

        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function generateOutfit() {
            const top = getRandomItem(outfitData.tops);
            const bottom = getRandomItem(outfitData.bottoms);
            const shoe = getRandomItem(outfitData.shoes);
            return { top, bottom, shoe };
        }

        function showResult(outfit) {
            const resultSection = document.getElementById('result-section');
            const resultGrid = document.getElementById('result-grid');
            
            resultGrid.innerHTML = `
                <div class="result-item">
                    <div class="result-emoji">${outfit.top.emoji}</div>
                    <div class="result-name">${outfit.top.name}</div>
                    <div class="result-label">上衣</div>
                </div>
                <div class="plus-sign">+</div>
                <div class="result-item">
                    <div class="result-emoji">${outfit.bottom.emoji}</div>
                    <div class="result-name">${outfit.bottom.name}</div>
                    <div class="result-label">裤子</div>
                </div>
                <div class="plus-sign">+</div>
                <div class="result-item">
                    <div class="result-emoji">${outfit.shoe.emoji}</div>
                    <div class="result-name">${outfit.shoe.name}</div>
                    <div class="result-label">鞋子</div>
                </div>
            `;
            
            resultSection.classList.add('show');
            
            setTimeout(() => {
                const items = resultGrid.querySelectorAll('.result-item');
                items.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('show');
                    }, index * 200);
                });
            }, 100);
        }

        function init() {
            renderPresetList(outfitData.tops, 'tops-list');
            renderPresetList(outfitData.bottoms, 'bottoms-list');
            renderPresetList(outfitData.shoes, 'shoes-list');

            const btn = document.getElementById('random-btn');
            btn.addEventListener('click', () => {
                btn.classList.add('loading');
                
                setTimeout(() => {
                    const outfit = generateOutfit();
                    showResult(outfit);
                    btn.classList.remove('loading');
                }, 500);
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
