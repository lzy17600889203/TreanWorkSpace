<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>康威生命游戏模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 320px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .sidebar h1 {
      color: #00d9ff;
      font-size: 20px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group label {
      display: block;
      color: #aaa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #00d9ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
    }

    .control-group input[type="number"] {
      width: 80px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #fff;
      outline: none;
    }

    .control-group input[type="number"]:focus {
      border-color: #00d9ff;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d9ff, #0066ff);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      color: #fff;
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
    }

    .btn-preset {
      background: rgba(100, 200, 100, 0.2);
      color: #64c864;
      border: 1px solid rgba(100, 200, 100, 0.3);
    }

    .btn-preset:hover {
      background: rgba(100, 200, 100, 0.3);
    }

    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      display: block;
      cursor: crosshair;
    }

    .info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 12px;
      color: #fff;
      min-width: 200px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .info-label {
      color: #aaa;
      font-size: 14px;
    }

    .info-value {
      color: #00d9ff;
      font-size: 18px;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }

    .generation-counter {
      font-size: 32px;
      color: #00ff88;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }

    .rules-panel {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .rules-panel h3 {
      color: #00d9ff;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .rule-input {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    .rule-input input {
      width: 40px;
      padding: 6px;
      text-align: center;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #00d9ff;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .switch-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .pattern-list {
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .pattern-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      margin-bottom: 5px;
      cursor: pointer;
    }

    .pattern-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .pattern-item span {
      color: #fff;
      font-size: 13px;
    }

    .pattern-item button {
      background: none;
      border: none;
      color: #ff4757;
      cursor: pointer;
      font-size: 12px;
    }

    .save-pattern {
      margin-top: 10px;
    }

    .save-pattern input {
      width: calc(100% - 80px);
      padding: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: #fff;
      outline: none;
    }

    .save-pattern button {
      width: 70px;
      padding: 8px;
      margin-left: 5px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4757;
      animation: pulse 2s infinite;
    }

    .status-indicator.running {
      background: #00ff88;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .zoom-controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 10px;
      border-radius: 8px;
    }

    .zoom-btn {
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      margin: 5px;
      transition: all 0.2s;
    }

    .zoom-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .zoom-level {
      color: #fff;
      text-align: center;
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <h1>🎮 康威生命游戏</h1>
      
      <div class="control-group">
        <div class="switch-label">
          <span class="info-label">运行状态</span>
          <div class="status-indicator" id="statusIndicator"></div>
        </div>
      </div>

      <div class="control-group">
        <label>演化速度: <span id="speedValue">50</span> ms</label>
        <input type="range" id="speedSlider" min="10" max="1000" value="50">
      </div>

      <div class="control-group">
        <label>网格大小: <span id="gridSizeValue">50x50</span></label>
        <input type="range" id="gridSizeSlider" min="20" max="200" value="50">
      </div>

      <div class="rules-panel">
        <h3>规则参数 (B/S)</h3>
        <div class="rule-input">
          <label class="info-label" style="margin-bottom: 0;">诞生:</label>
          <input type="number" id="birthRule" value="3" min="0" max="8">
        </div>
        <div class="rule-input">
          <label class="info-label" style="margin-bottom: 0;">存活:</label>
          <input type="number" id="surviveRule" value="2,3" placeholder="2,3">
        </div>
      </div>

      <div class="control-group">
        <div class="switch-label">
          <span class="info-label">边界循环</span>
          <label class="switch">
            <input type="checkbox" id="wrapAround" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <button class="btn btn-primary" id="startBtn">▶ 开始</button>
      <button class="btn btn-secondary" id="pauseBtn">⏸ 暂停</button>
      <button class="btn btn-secondary" id="stepBtn">⏭ 单步</button>
      <button class="btn btn-danger" id="clearBtn">🗑 清空</button>

      <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
        <h3 style="color: #00d9ff; margin-bottom: 10px; font-size: 14px;">预设图案</h3>
        <button class="btn btn-preset" id="gosperBtn">🔫 高斯帕滑翔机枪</button>
        <button class="btn btn-preset" id="randomBtn">🎲 随机噪声填充</button>
        <button class="btn btn-preset" id="blockBtn">⬜ 稳定静态方块</button>
        <button class="btn btn-preset" id="growthBtn">📈 无限增长模式</button>
      </div>

      <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1);">
        <h3 style="color: #00d9ff; margin-bottom: 10px; font-size: 14px;">图案库</h3>
        <div class="pattern-list" id="patternList"></div>
        <div class="save-pattern">
          <input type="text" id="patternName" placeholder="图案名称">
          <button class="btn btn-primary" style="width: 70px; padding: 8px;" id="savePatternBtn">保存</button>
        </div>
      </div>
    </div>

    <div class="canvas-container">
      <canvas id="canvas"></canvas>
      
      <div class="info-panel">
        <div class="info-item">
          <span class="info-label">代数</span>
          <span class="info-value generation-counter" id="generation">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">存活细胞</span>
          <span class="info-value" id="aliveCount">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">网格尺寸</span>
          <span class="info-value" id="gridSize">50 × 50</span>
        </div>
        <div class="info-item">
          <span class="info-label">缩放</span>
          <span class="info-value" id="zoomLevel">100%</span>
        </div>
      </div>

      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomInBtn">+</button>
        <div class="zoom-level" id="zoomDisplay">100%</div>
        <button class="zoom-btn" id="zoomOutBtn">−</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
