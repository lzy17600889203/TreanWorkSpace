<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聚会任务大转盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .spin-button {
            width: 100%;
            padding: 20px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
        }

        .spin-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        .spin-button:active {
            transform: translateY(0);
        }

        .spin-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .task-type {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .task-type.truth {
            background: #e3f2fd;
            color: #1976d2;
        }

        .task-type.dare {
            background: #ffebee;
            color: #c62828;
        }

        .task-content {
            font-size: 1.4em;
            color: #333;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4caf50;
            color: white;
        }

        .btn-primary:hover {
            background: #43a047;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #e53935;
        }

        .btn-secondary {
            background: #9e9e9e;
            color: white;
        }

        .btn-secondary:hover {
            background: #757575;
        }

        .task-list {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }

        .task-list h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .task-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
        }

        .task-item-content {
            flex: 1;
        }

        .task-item-actions {
            display: flex;
            gap: 8px;
        }

        .task-item-actions button {
            padding: 6px 12px;
            font-size: 0.8em;
            border-radius: 15px;
        }

        .add-task-form {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .add-task-form h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 聚会任务大转盘 🎉</h1>
        <div class="stats" id="stats">剩余任务：10</div>
        <button class="spin-button" id="spinButton">开始抽奖</button>

        <div class="task-list">
            <h2>添加新任务</h2>
            <div class="add-task-form">
                <div class="form-group">
                    <label>任务内容</label>
                    <input type="text" id="taskContent" placeholder="输入任务内容...">
                </div>
                <div class="form-group">
                    <label>任务类型</label>
                    <select id="taskType">
                        <option value="truth">真心话</option>
                        <option value="dare">大冒险</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="addTaskButton">添加任务</button>
            </div>

            <h2 style="margin-top: 30px;">任务列表</h2>
            <div id="taskList"></div>
        </div>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <div class="task-type" id="modalType"></div>
            <div class="task-content" id="modalContent"></div>
            <div class="modal-buttons">
                <button class="btn btn-primary" id="completeBtn">已完成</button>
                <button class="btn btn-danger" id="removeBtn">移除任务</button>
                <button class="btn btn-secondary" id="closeBtn">稍后再试</button>
            </div>
        </div>
    </div>

    <script>
        let currentTask = null;

        const spinButton = document.getElementById('spinButton');
        const taskModal = document.getElementById('taskModal');
        const modalType = document.getElementById('modalType');
        const modalContent = document.getElementById('modalContent');
        const completeBtn = document.getElementById('completeBtn');
        const removeBtn = document.getElementById('removeBtn');
        const closeBtn = document.getElementById('closeBtn');
        const taskList = document.getElementById('taskList');
        const stats = document.getElementById('stats');
        const taskContentInput = document.getElementById('taskContent');
        const taskTypeSelect = document.getElementById('taskType');
        const addTaskButton = document.getElementById('addTaskButton');

        async function loadTasks() {
            const response = await fetch('/api/tasks/all');
            const tasks = await response.json();
            renderTaskList(tasks);
            const activeTasks = tasks.filter(t => t.status === 'active');
            stats.textContent = `剩余任务：${activeTasks.length}`;
        }

        function renderTaskList(tasks) {
            taskList.innerHTML = tasks.map(task => `
                <div class="task-item ${task.status === 'completed' ? 'completed' : ''}">
                    <div class="task-item-content">
                        <strong>${task.type === 'truth' ? '真心话' : '大冒险'}</strong>: ${task.content}
                    </div>
                    <div class="task-item-actions">
                        ${task.status === 'active' ? `
                            <button class="btn btn-primary" onclick="markComplete(${task.id})">完成</button>
                            <button class="btn btn-danger" onclick="deleteTask(${task.id})">删除</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function spin() {
            spinButton.disabled = true;
            const response = await fetch('/api/tasks/random');
            if (response.status === 404) {
                alert('没有可用的任务了！');
                spinButton.disabled = false;
                return;
            }
            currentTask = await response.json();
            showModal(currentTask);
            spinButton.disabled = false;
        }

        function showModal(task) {
            modalType.textContent = task.type === 'truth' ? '真心话' : '大冒险';
            modalType.className = 'task-type ' + task.type;
            modalContent.textContent = task.content;
            taskModal.classList.add('show');
        }

        function hideModal() {
            taskModal.classList.remove('show');
            currentTask = null;
        }

        async function markComplete(id) {
            await fetch(`/api/tasks/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'completed' })
            });
            hideModal();
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`/api/tasks/${id}`, {
                method: 'DELETE'
            });
            hideModal();
            loadTasks();
        }

        async function addTask() {
            const content = taskContentInput.value.trim();
            const type = taskTypeSelect.value;
            if (!content) {
                alert('请输入任务内容');
                return;
            }
            const response = await fetch('/api/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, type })
            });
            
            if (!response.ok) {
                const data = await response.json();
                alert(data.error || '添加任务失败');
                return;
            }
            
            taskContentInput.value = '';
            loadTasks();
        }

        spinButton.addEventListener('click', spin);
        completeBtn.addEventListener('click', () => markComplete(currentTask.id));
        removeBtn.addEventListener('click', () => deleteTask(currentTask.id));
        closeBtn.addEventListener('click', hideModal);
        addTaskButton.addEventListener('click', addTask);

        taskModal.addEventListener('click', (e) => {
            if (e.target === taskModal) {
                hideModal();
            }
        });

        loadTasks();
    </script>
</body>
</html>
